{% extends "base.html" %}
{% block title %}AI 电影推荐 — 豆瓣电影 TOP250{% endblock %}

{% block extra_head %}
<style>
.recommend-container { max-width: 900px; margin: 0 auto; }
.filter-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 28px; margin-bottom: 28px; }
.filter-label { font-weight: 600; color: #495057; margin-bottom: 8px; font-size: 0.9rem; }
.result-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 28px; min-height: 200px; }
.result-content { line-height: 1.8; }
.result-content h4 { color: #e74c3c; margin-top: 20px; margin-bottom: 8px; font-size: 1.1rem; }
.result-content ul { padding-left: 20px; }
.result-content li { margin-bottom: 6px; }
.loading-spinner { text-align: center; padding: 40px; }
.loading-spinner .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
{% endblock %}

{% block content %}
<section class="breadcrumbs" style="padding-top: 120px;">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center">
      <h2><i class="bx bx-star"></i> AI 电影推荐</h2>
      <ol>
        <li><a href="{{ url_for('web.index') }}">首页</a></li>
        <li>AI 推荐</li>
      </ol>
    </div>
  </div>
</section>

<section style="padding: 30px 0 60px;">
  <div class="container">
    <div class="recommend-container">
      <div class="filter-card">
        <h4 class="mb-3" style="color: #2c3e50;"><i class="bx bx-slider"></i> 筛选条件</h4>
        <form id="recommendForm">
          <div class="row g-3">
            <div class="col-md-4">
              <div class="filter-label">电影类型</div>
              <select class="form-control" name="genre" id="genreSelect">
                <option value="">不限</option>
                {% for g in genres %}
                <option value="{{ g }}">{{ g }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-3">
              <div class="filter-label">最低评分</div>
              <select class="form-control" name="min_score">
                <option value="0">不限</option>
                <option value="9">9.0+</option>
                <option value="8.5">8.5+</option>
                <option value="8" selected>8.0+</option>
                <option value="7.5">7.5+</option>
              </select>
            </div>
            <div class="col-md-5">
              <div class="filter-label">年份范围</div>
              <div class="row g-2">
                <div class="col-6">
                  <input type="number" class="form-control" name="year_from" placeholder="起始年" min="1900">
                </div>
                <div class="col-6">
                  <input type="number" class="form-control" name="year_to" placeholder="截止年" min="1900">
                </div>
              </div>
            </div>
            <div class="col-md-12">
              <div class="filter-label">自由描述（更灵活，选填）</div>
              <input type="text" class="form-control" name="preferences" placeholder="例如：适合情侣一起看的温馨电影、烧脑悬疑片、让人深思的经典...">
            </div>
            <div class="col-md-12">
              <button type="submit" class="btn btn-primary btn-lg btn-block" style="width:100%; padding: 12px;">
                <i class="bx bx-search"></i> AI 智能推荐
              </button>
            </div>
          </div>
        </form>
      </div>

      <div class="result-card" id="resultArea">
        <div class="text-center text-muted" style="padding: 40px 0;">
          <i class="bx bx-film" style="font-size: 3rem;"></i>
          <p class="mt-2">设置筛选条件，让 AI 为你推荐最合适的电影</p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
$(document).ready(function() {
  $('#recommendForm').on('submit', function(e) {
    e.preventDefault();
    const data = {
      genre: $('#genreSelect').val(),
      min_score: parseFloat($('select[name="min_score"]').val()) || 0,
      year_from: parseInt($('input[name="year_from"]').val()) || 0,
      year_to: parseInt($('input[name="year_to"]').val()) || 0,
      preferences: $('input[name="preferences"]').val().trim(),
    };

    $('#resultArea').html(`
      <div class="loading-spinner">
        <div class="spinner"></div>
        <p class="text-muted">AI 正在分析电影数据，为你推荐最合适的影片...</p>
      </div>
    `);

    $.ajax({
      url: '{{ url_for("ai.api_recommend") }}',
      method: 'POST',
      contentType: 'application/json',
      data: JSON.stringify(data),
      success: function(resp) {
        if (resp.reply) {
          const formatted = resp.reply
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');
          $('#resultArea').html(`
            <h5 class="mb-3" style="color: #2c3e50;">
              <i class="bx bx-check-circle" style="color: #27ae60;"></i> 推荐结果
            </h5>
            <div class="result-content">${formatted}</div>
          `);
        }
      },
      error: function() {
        $('#resultArea').html('<div class="alert alert-danger">请求失败，请稍后重试</div>');
      }
    });
  });
});
</script>
{% endblock %}
